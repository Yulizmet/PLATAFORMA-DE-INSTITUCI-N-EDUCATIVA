<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta http-equiv="X-UA-Compatible" content="IE=edge" />
  <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />

  <link rel="preconnect" href="https://fonts.gstatic.com" />
  <link rel="shortcut icon" href="img/icons/icon-48x48.png" />

  <title>Error 500</title>

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet" />
  <link href="css/app.css" rel="stylesheet" />
</head>

<body>
  <main class="d-flex w-100 min-vh-100">
    <div class="container d-flex flex-column">
      <div class="row min-vh-100">
        <div class="col-sm-10 col-md-8 col-lg-6 col-xl-5 mx-auto d-table">
          <div class="d-table-cell align-middle">
            <div class="text-center">
              <h1 class="display-1 fw-bold">500</h1>
              <p class="h2">Error interno del servidor.</p>
              <p class="lead fw-normal mt-3 mb-4">
                El servidor encontró un problema inesperado y no pudo completar la solicitud.
              </p>
              <a class="btn btn-primary btn-lg" href="/">Volver al inicio</a>
            </div>
          </div>
        </div>
      </div>
    </div>
  </main>

  <script src="js/app.js"></script>
</body>
</html>
